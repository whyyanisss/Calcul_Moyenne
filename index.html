<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur L3 EEA - S5</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel pour compiler le JSX dans le navigateur -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Petits ajustements pour l'apparence */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- ICONES SVG (Pour ne pas dépendre de lucide-react) ---
        const Icons = {
            Calculator: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
            Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>,
            RotateCcw: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Power: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/></svg>,
            Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
        };

        // --- DONNÉES (Source: PDF MCC) ---
        const DATA_MODULES = [
            {
                id: 'LU3EE100',
                name: 'Élec 3 - Syst. Num. & Proc. Embarqués',
                ects: 6,
                inputs: [
                    { id: 'er1', label: 'ER1', weight: 35, name: 'Examen Réparti 1' },
                    { id: 'er2', label: 'ER2', weight: 35, name: 'Examen Réparti 2' },
                    { id: 'tp', label: 'TP', weight: 30, name: 'Contrôle de TP' },
                ],
                calculate: (vals) => {
                    const er1 = Number(vals.er1 || 0);
                    const er2 = Number(vals.er2 || 0);
                    const tp = Number(vals.tp || 0);
                    // Ecrit = SUP (ER1+ER2; 2*ER2) = 70
                    const ecrit = Math.max(er1 + er2, er2 * 2);
                    return ecrit + tp;
                },
                ruleDescription: "Écrit (70%) = Max(ER1+ER2, 2×ER2) + TP"
            },
            {
                id: 'UL3EE111',
                name: 'Automatique',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'ER1', weight: 75, name: 'Examen Écrit' },
                    { id: 'tp', label: 'TP', weight: 25, name: 'Moyenne Prépa & CR' },
                ],
                calculate: (vals) => Number(vals.er1 || 0) + Number(vals.tp || 0),
                ruleDescription: "Écrit (75%) + TP (25%)"
            },
            {
                id: 'UL3EE112',
                name: 'Actionneurs',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'ER1', weight: 70, name: 'Examen Écrit' },
                    { id: 'tp', label: 'TP', weight: 30, name: 'Contrôle de TP' },
                ],
                calculate: (vals) => Number(vals.er1 || 0) + Number(vals.tp || 0),
                ruleDescription: "Écrit (70%) + TP (30%)"
            },
            {
                id: 'LU3EE110',
                name: 'Électromagnétisme 3 : Propagation',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'ER1', weight: 30, name: 'Examen Réparti 1' },
                    { id: 'er2', label: 'ER2', weight: 70, name: 'Examen Réparti 2' },
                ],
                calculate: (vals) => {
                    const er1 = Number(vals.er1 || 0);
                    const er2 = Number(vals.er2 || 0);
                    // Ecrit = SUP((ER1+ER2); ER2*10/7) = 100
                    return Math.max(er1 + er2, er2 * (10 / 7));
                },
                ruleDescription: "Max(ER1+ER2, ER2 × 1.43)"
            },
            {
                id: 'UL3EE131',
                name: 'Python 2',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'ER1', weight: 60, name: 'Examen Sans Doc.' },
                    { id: 'tp', label: 'TP', weight: 40, name: 'Quiz + Contrôle TP' },
                ],
                calculate: (vals) => Number(vals.er1 || 0) + Number(vals.tp || 0),
                ruleDescription: "Écrit (60%) + TP (40%)"
            },
            {
                id: 'UL3EE154',
                name: 'Réseaux élec. & Transition',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'DM', weight: 10, name: 'Devoir Maison' },
                    { id: 'er2', label: 'Exam', weight: 60, name: 'Épreuve Terminale' },
                    { id: 'tp', label: 'TP', weight: 30, name: 'Contrôle de TP' },
                ],
                calculate: (vals) => Number(vals.er1 || 0) + Number(vals.er2 || 0) + Number(vals.tp || 0),
                ruleDescription: "DM(10) + Exam(60) + TP(30)"
            },
            {
                id: 'LU3EEP05',
                name: 'Analyse & Traitement du Son',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'ER1', weight: 20, name: 'Examen 1' },
                    { id: 'er2', label: 'ER2', weight: 40, name: 'Examen 2' },
                    { id: 'tp', label: 'Projet', weight: 40, name: 'Rapport + Soutenance' },
                ],
                calculate: (vals) => Number(vals.er1 || 0) + Number(vals.er2 || 0) + Number(vals.tp || 0),
                ruleDescription: "ER1(20)+ER2(40)+Projet(40)"
            },
            {
                id: 'LU3EEP11',
                name: 'Intro Télécom',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'ER1', weight: 25, name: 'Examen 1' },
                    { id: 'er2', label: 'ER2', weight: 50, name: 'Examen 2' },
                    { id: 'tp', label: 'TP', weight: 25, name: 'TP' },
                ],
                calculate: (vals) => Number(vals.er1 || 0) + Number(vals.er2 || 0) + Number(vals.tp || 0),
                ruleDescription: "ER1(25)+ER2(50)+TP(25)"
            },
            {
                id: 'UL3EE151',
                name: 'Matériaux & Composants',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'Quiz', weight: 20, name: 'Quiz' },
                    { id: 'er2', label: 'Ecrit', weight: 50, name: 'Épreuve Écrite' },
                    { id: 'tp', label: 'TP', weight: 30, name: 'Moyenne TP' },
                ],
                calculate: (vals) => {
                    const er1 = Number(vals.er1 || 0);
                    const er2 = Number(vals.er2 || 0);
                    const tp = Number(vals.tp || 0);
                    // Ecrit = SUP((ER1+ER2); ER2*7/5) = 70
                    const ecrit = Math.max(er1 + er2, er2 * (7/5));
                    return ecrit + tp;
                },
                ruleDescription: "Max(Quiz+Ecrit, Ecrit×1.4) + TP"
            },
            {
                id: 'LIU3EEOIP',
                name: 'OIP (Orientation)',
                ects: 3,
                inputs: [
                    { id: 'oral', label: 'Oral', weight: 40, name: 'Présentation Orale' },
                    { id: 'docs', label: 'Docs', weight: 60, name: 'Dossiers (CV, LM...)' },
                ],
                calculate: (vals) => Number(vals.oral || 0) + Number(vals.docs || 0),
                ruleDescription: "Oral (40%) + Docs (60%)"
            },
            {
                id: 'LU3EEP10',
                name: 'Gestion Communication',
                ects: 3,
                inputs: [
                    { id: 'ecrit', label: 'Ecrit', weight: 50, name: 'Rapport écrit' },
                    { id: 'oral', label: 'Oral', weight: 50, name: 'Soutenance orale' },
                ],
                calculate: (vals) => Number(vals.ecrit || 0) + Number(vals.oral || 0),
                ruleDescription: "Rapport(50) + Soutenance(50)"
            },
            {
                id: 'LU3EEP12',
                name: 'Projet en Autonomie',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'Ecrit', weight: 30, name: 'Ecrit (30%)' },
                    { id: 'rap', label: 'Rap', weight: 30, name: 'Rapport (30%)' },
                    { id: 'imp', label: 'Imp', weight: 40, name: 'Implication (40%)' },
                ],
                calculate: (vals) => Number(vals.er1 || 0) + Number(vals.rap || 0) + Number(vals.imp || 0),
                ruleDescription: "Ecrit(30) + Rapport(30) + Impl.(40)"
            },
            {
                id: 'ANGLAIS',
                name: 'Anglais',
                ects: 3,
                inputs: [
                    { id: 'er1', label: 'Note', weight: 100, name: 'Évaluation Unique' },
                ],
                calculate: (vals) => Number(vals.er1 || 0),
                ruleDescription: "Évaluation unique (100%)"
            },
            {
                id: 'LE3EEPO2',
                name: 'Alternance S5',
                ects: 3,
                inputs: [
                    { id: 'note', label: 'Note', weight: 100, name: 'Rapport mi-alternance' },
                ],
                calculate: (vals) => Number(vals.note || 0),
                ruleDescription: "Rapport mi-alternance (100%)"
            }
        ];

        // --- COMPOSANTS UTILITAIRES ---
        const Tooltip = ({ text, children }) => {
            const [show, setShow] = useState(false);
            return (
                <div className="relative flex flex-col items-center" onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)}>
                    {children}
                    {show && (
                        <div className="absolute z-20 bottom-full mb-2 px-3 py-1 bg-slate-800 text-white text-xs rounded shadow-lg whitespace-nowrap">
                            {text}
                            <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-4 border-transparent border-t-slate-800"></div>
                        </div>
                    )}
                </div>
            );
        };

        // Fonction Box-Muller pour générer une distribution normale
        function randn_bm() {
            let u = 0, v = 0;
            while(u === 0) u = Math.random();
            while(v === 0) v = Math.random();
            return Math.sqrt( -2.0 * Math.log( u ) ) * Math.cos( 2.0 * Math.PI * v );
        }

        // --- APPLICATION PRINCIPALE ---
        function App() {
            const [marks, setMarks] = useState({});
            const [disabledModules, setDisabledModules] = useState({});
            const [isProbMode, setIsProbMode] = useState(false);
            const [targetGrade, setTargetGrade] = useState(10);
            const [simulationResults, setSimulationResults] = useState(null);
            const [isLoaded, setIsLoaded] = useState(false);

            // --- LOCAL STORAGE ---
            useEffect(() => {
                const savedMarks = localStorage.getItem('eea_marks');
                const savedDisabled = localStorage.getItem('eea_disabled');
                
                if (savedMarks) setMarks(JSON.parse(savedMarks));
                if (savedDisabled) setDisabledModules(JSON.parse(savedDisabled));
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('eea_marks', JSON.stringify(marks));
                    localStorage.setItem('eea_disabled', JSON.stringify(disabledModules));
                }
            }, [marks, disabledModules, isLoaded]);

            // --- HANDLERS ---
            const handleInputChange = (moduleId, inputId, value, type = 'note') => {
                let numericValue = parseFloat(value.replace(',', '.'));
                if (isNaN(numericValue)) numericValue = null;
                
                if (type === 'note') {
                    if (numericValue !== null && numericValue < 0) numericValue = 0;
                    if (numericValue !== null && numericValue > 20) numericValue = 20;
                } else {
                    if (numericValue !== null && numericValue < 0) numericValue = 0;
                }

                setMarks(prev => ({
                    ...prev,
                    [`${moduleId}-${inputId}${type === 'sigma' ? '-sigma' : ''}`]: numericValue
                }));
            };

            const toggleModule = (moduleId) => {
                setDisabledModules(prev => ({
                    ...prev,
                    [moduleId]: !prev[moduleId]
                }));
            };

            const reset = () => {
                if(window.confirm("Voulez-vous vraiment tout effacer ?")) {
                    setMarks({});
                    setDisabledModules({});
                    setTargetGrade(10);
                    setSimulationResults(null);
                    localStorage.removeItem('eea_marks');
                    localStorage.removeItem('eea_disabled');
                }
            };

            // --- CALCULS ---
            const currentStats = useMemo(() => {
                let totalWeightedScore = 0;
                let totalECTS = 0;
                let moduleDetails = [];

                DATA_MODULES.forEach(mod => {
                    const isDisabled = disabledModules[mod.id];
                    const rawValues = {};
                    const userValues = {};
                    const sigmas = {};

                    mod.inputs.forEach(input => {
                        const val = marks[`${mod.id}-${input.id}`];
                        const sigma = marks[`${mod.id}-${input.id}-sigma`];
                        userValues[input.id] = val;
                        sigmas[input.id] = sigma;
                        const v = val === undefined || val === null ? 0 : val;
                        rawValues[input.id] = (v / 20) * input.weight;
                    });

                    const score100 = mod.calculate(rawValues);
                    const score20 = (score100 / 100) * 20;
                    
                    if (!isDisabled) {
                        totalWeightedScore += score20 * mod.ects;
                        totalECTS += mod.ects;
                    }

                    moduleDetails.push({
                        ...mod,
                        score20,
                        userValues,
                        sigmas,
                        isDisabled
                    });
                });

                const average = totalECTS > 0 ? totalWeightedScore / totalECTS : 0;
                return { average, details: moduleDetails, totalECTS };
            }, [marks, disabledModules]);

            // --- SIMULATION ---
            useEffect(() => {
                if (!isProbMode) {
                    setSimulationResults(null);
                    return;
                }

                const SIMULATION_RUNS = 5000;
                let successCount = 0;
                let sumAverages = 0;

                const activeModules = DATA_MODULES.filter(m => !disabledModules[m.id]).map(mod => ({
                    ...mod,
                    inputsData: mod.inputs.map(input => ({
                        id: input.id,
                        weight: input.weight,
                        mean: marks[`${mod.id}-${input.id}`] || 0,
                        sigma: marks[`${mod.id}-${input.id}-sigma`] || 0
                    }))
                }));

                for (let i = 0; i < SIMULATION_RUNS; i++) {
                    let runWeightedScore = 0;
                    let runECTS = 0;

                    for (const mod of activeModules) {
                        const runRawValues = {};
                        for (const input of mod.inputsData) {
                            let randomNote = Number(input.mean);
                            if (input.sigma > 0) randomNote += randn_bm() * Number(input.sigma);
                            if (randomNote < 0) randomNote = 0;
                            if (randomNote > 20) randomNote = 20;
                            runRawValues[input.id] = (randomNote / 20) * input.weight;
                        }
                        const runScore100 = mod.calculate(runRawValues);
                        runWeightedScore += (runScore100 / 100) * 20 * mod.ects;
                        runECTS += mod.ects;
                    }

                    const runAverage = runECTS > 0 ? runWeightedScore / runECTS : 0;
                    sumAverages += runAverage;
                    if (runAverage >= targetGrade) successCount++;
                }

                setSimulationResults({
                    probability: (successCount / SIMULATION_RUNS) * 100,
                    simulatedAverage: sumAverages / SIMULATION_RUNS
                });

            }, [marks, isProbMode, targetGrade, disabledModules]);

            if (!isLoaded) return <div className="p-10 text-center text-slate-500">Chargement...</div>;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-6 font-sans">
                    
                    {/* Header */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 md:p-6 mb-6 flex flex-col xl:flex-row justify-between items-center gap-6 sticky top-2 z-30">
                        <div className="flex flex-col gap-4 w-full xl:w-auto">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-600 p-3 rounded-lg shadow-blue-200 shadow-md text-white">
                                    <Icons.Calculator />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-bold text-slate-800">Simulateur L3 EEA</h1>
                                    <div className="flex items-center gap-2 text-slate-500 text-xs font-medium">
                                        <div className="w-3 h-3 text-slate-500"><Icons.Save /></div> Sauvegarde auto
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3 bg-slate-100 p-1.5 rounded-lg border border-slate-200 w-fit">
                                <button onClick={() => setIsProbMode(false)} className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all ${!isProbMode ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                    Simple
                                </button>
                                <button onClick={() => setIsProbMode(true)} className={`px-3 py-1.5 rounded-md text-sm font-medium transition-all flex items-center gap-2 ${isProbMode ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                    <div className="w-4 h-4"><Icons.Activity /></div> Probabilité
                                </button>
                            </div>
                        </div>

                        {isProbMode && (
                            <div className="flex-1 w-full xl:w-auto bg-indigo-50 border border-indigo-100 rounded-xl p-3 flex flex-col sm:flex-row items-center gap-4 justify-center">
                                <div className="flex items-center gap-2">
                                    <div className="w-5 h-5 text-indigo-600"><Icons.Target /></div>
                                    <span className="font-bold text-indigo-900 text-sm uppercase">Objectif</span>
                                    <input type="number" value={targetGrade} onChange={(e) => setTargetGrade(parseFloat(e.target.value) || 0)} className="w-16 p-2 text-center font-bold text-indigo-700 bg-white border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-400 focus:outline-none" step="0.5" max="20" />
                                </div>
                                <div className="flex-1 w-full sm:w-auto flex flex-col gap-1 min-w-[200px]">
                                    <div className="flex justify-between text-xs font-bold text-indigo-800">
                                        <span>Succès estimé</span>
                                        <span>{simulationResults ? simulationResults.probability.toFixed(0) : 0}%</span>
                                    </div>
                                    <div className="w-full h-3 bg-indigo-200 rounded-full overflow-hidden">
                                        <div className={`h-full transition-all duration-500 ease-out ${simulationResults?.probability >= 80 ? 'bg-emerald-500' : simulationResults?.probability >= 50 ? 'bg-blue-500' : simulationResults?.probability >= 20 ? 'bg-amber-500' : 'bg-red-500'}`} style={{ width: `${simulationResults ? simulationResults.probability : 0}%` }} />
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="text-right flex flex-col items-end gap-2 w-full xl:w-auto">
                            <div className="text-xs text-slate-400 uppercase tracking-wider font-semibold">
                                {isProbMode ? "Moyenne Estimée" : "Moyenne Actuelle"}
                            </div>
                            <div className="flex items-baseline gap-2 justify-end">
                                <span className={`text-4xl font-bold ${currentStats.average >= 10 ? 'text-emerald-600' : 'text-amber-600'}`}>
                                    {currentStats.average.toFixed(3)}
                                </span>
                                <span className="text-lg text-slate-400 font-medium">/ 20</span>
                            </div>
                            <div className="text-xs text-slate-400 font-medium">sur {currentStats.totalECTS} ECTS actifs</div>
                            <button onClick={reset} className="text-xs text-slate-400 hover:text-red-500 flex items-center gap-1 transition-colors mt-1">
                                <div className="w-3 h-3"><Icons.RotateCcw /></div> Tout effacer
                            </button>
                        </div>
                    </div>

                    {/* Tableau */}
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wider">
                                        <th className="p-4 w-12 text-center">On/Off</th>
                                        <th className="p-4 w-20 font-semibold hidden md:table-cell">Code</th>
                                        <th className="p-4 w-1/4 font-semibold">Module</th>
                                        <th className="p-4 font-semibold">Notes (sur 20) {isProbMode && <span className="ml-2 normal-case text-indigo-500 font-normal opacity-80">+ Incertitude</span>}</th>
                                        <th className="p-4 w-24 text-right font-semibold">Moy.</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {currentStats.details.map((mod) => (
                                        <tr key={mod.id} className={`transition-all duration-200 ${mod.isDisabled ? 'bg-slate-50 opacity-50 grayscale' : 'hover:bg-blue-50/30'}`}>
                                            <td className="p-4 text-center">
                                                <button onClick={() => toggleModule(mod.id)} className={`p-2 rounded-full transition-colors ${mod.isDisabled ? 'text-slate-300 hover:text-slate-500' : 'text-emerald-500 hover:bg-emerald-50'}`} title="Activer/Désactiver">
                                                    <div className="w-5 h-5"><Icons.Power /></div>
                                                </button>
                                            </td>
                                            <td className="p-4 font-mono text-xs md:text-sm font-bold text-slate-500 hidden md:table-cell align-middle">{mod.id}</td>
                                            <td className="p-4 align-middle">
                                                <div className="flex flex-col">
                                                    <span className={`font-semibold text-sm ${mod.isDisabled ? 'text-slate-500 line-through' : 'text-slate-800'}`}>{mod.name}</span>
                                                    <div className="flex items-center gap-2 mt-1 flex-wrap">
                                                        <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-slate-100 text-slate-600 border border-slate-200">{mod.ects} ECTS</span>
                                                        <span className="text-[10px] text-slate-400 max-w-[200px]" title={mod.ruleDescription}>{mod.ruleDescription}</span>
                                                    </div>
                                                </div>
                                            </td>
                                            <td className="p-4 align-middle">
                                                <div className="flex flex-wrap items-center gap-x-4 gap-y-3">
                                                    {mod.inputs.map((input) => {
                                                        const displayVal = mod.userValues[input.id] ?? '';
                                                        const displaySigma = mod.sigmas[input.id] ?? '';
                                                        return (
                                                            <div key={input.id} className="flex flex-col gap-1 group">
                                                                <Tooltip text={`${input.name} (${input.weight}%)`}>
                                                                    <label className={`text-[10px] md:text-xs font-bold uppercase cursor-help transition-colors whitespace-nowrap ${mod.isDisabled ? 'text-slate-300' : 'text-slate-400 hover:text-blue-500'}`}>{input.label}</label>
                                                                </Tooltip>
                                                                <div className="flex items-center gap-1 relative">
                                                                    <input type="number" min="0" max="20" step="0.5" placeholder="-" disabled={mod.isDisabled} value={displayVal} onChange={(e) => handleInputChange(mod.id, input.id, e.target.value, 'note')} className={`w-12 md:w-14 py-1.5 px-1 text-center text-sm font-mono border rounded transition-all focus:outline-none focus:ring-2 ${displayVal !== '' && displayVal < 10 && !mod.isDisabled ? 'text-red-600 font-bold' : 'text-slate-800'} ${mod.isDisabled ? 'bg-slate-100 border-slate-200 cursor-not-allowed' : 'bg-white border-slate-300 focus:border-blue-500 focus:ring-blue-100 shadow-sm'}`} />
                                                                    {isProbMode && !mod.isDisabled && (
                                                                        <>
                                                                            <span className="text-slate-300 font-light text-xs">±</span>
                                                                            <Tooltip text="Incertitude">
                                                                                <input type="number" min="0" max="10" step="0.5" placeholder="0" value={displaySigma} onChange={(e) => handleInputChange(mod.id, input.id, e.target.value, 'sigma')} className="w-8 md:w-10 py-1.5 px-1 text-center text-xs font-mono border border-indigo-200 rounded text-indigo-600 bg-indigo-50 focus:outline-none focus:ring-2 focus:ring-indigo-300" />
                                                                            </Tooltip>
                                                                        </>
                                                                    )}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </td>
                                            <td className="p-4 text-right align-middle">
                                                <div className={`text-sm md:text-base font-bold font-mono ${mod.isDisabled ? 'text-slate-300' : (mod.score20 >= 10 ? 'text-slate-700' : 'text-red-500')}`}>{mod.isDisabled ? '--' : mod.score20.toFixed(2)}</div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
